services:
  - type: web
    name: deploy-orchestrator-mcp
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: MCP_READ_ONLY
        value: "false"
      - key: MCP_REQUIRE_CONFIRMATION
        value: "true"
      - key: MCP_ALLOWED_PROVIDERS
        value: "render,railway,supabase"
      - key: MCP_ALLOWED_ENVIRONMENTS
        value: "preview,staging"
      - key: MCP_TRANSPORT
        value: "streamable-http"
      - key: MCP_HTTP_PATH
        value: "/mcp"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: MCP_REMOTE_AUTH_TOKEN
        sync: false
      - key: RENDER_API_KEY
        sync: false
